kind = "web"
previewPath = "/"
title = "World Cup Oracle"
version = "1.0.0"
id = "artifacts/world-cup-oracle"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19703

[services.development]
run = "pnpm --filter @workspace/world-cup-oracle run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/world-cup-oracle", "run", "build" ]
publicDir = "artifacts/world-cup-oracle/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19703"
BASE_PATH = "/"
